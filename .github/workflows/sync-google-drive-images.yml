name: Sync Google Drive Images

on:
  schedule:
    # Run daily at 2 AM UTC (adjust time as needed)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  sync-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-auth-httplib2 google-auth-oauthlib google-api-python-client pillow
      
      - name: Sync images from Google Drive
        env:
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          GOOGLE_DRIVE_FOLDER_ID: 1fg2v0J0Wy07823BBfyhGg07fPNSbn7m0
        run: |
          python scripts/sync_google_drive.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add assets/gold-teeth-images/ || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto: Sync new gold teeth images from Google Drive" && git push)
